<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SakuraColor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="petal-bg" aria-hidden="true">
    <span class="petal p1">🌸</span>
    <span class="petal p2">🌸</span>
    <span class="petal p3">🌸</span>
    <span class="petal p4">🌸</span>
    <span class="petal p5">🌸</span>
  </div>

  <!-- ヘッダー -->
  <header class="header">
    <h1 class="app-title">
      <span class="title-sakura">Sakura</span><span class="title-color">Color</span>
    </h1>
    <div class="streak-badge">
      <span class="streak-icon">🔥</span>
      <span class="streak-label">連続正解</span>
      <span class="streak-count" id="streakCount">0</span>
      <span class="streak-unit">問</span>
    </div>
  </header>

  <!-- メイン -->
  <main class="main">

    <!-- 出題カード -->
    <section class="question-card">
      <div class="member-name" id="memberName">読み込み中...</div>
      <div class="penlight-visual">
        <div class="penlight-stick" id="stick1"></div>
        <div class="penlight-stick" id="stick2"></div>
      </div>
    </section>

    <!-- 選択スロット -->
    <section class="selection-indicator">
      <div class="slot" id="slot1">
        <div class="slot-dot" id="slotDot1"></div>
        <div class="slot-text" id="slotText1">① 未選択</div>
      </div>
      <div class="slot-divider">＋</div>
      <div class="slot" id="slot2">
        <div class="slot-dot" id="slotDot2"></div>
        <div class="slot-text" id="slotText2">② 未選択</div>
      </div>
    </section>

    <!-- 色タイルグリッド ↔ 結果 (切り替え) -->
    <div class="switchable-area">

      <!-- 色タイル -->
      <section class="tile-section" id="tileSection">
        <div class="tile-hint">タップして2色を選択</div>
        <div class="tile-grid" id="tileGrid"></div>
      </section>

      <!-- 結果（判定後に表示） -->
      <section class="result-section hidden" id="resultSection">
        <div class="result-banner" id="resultBanner">
          <span class="result-icon" id="resultIcon"></span>
          <span class="result-text" id="resultText"></span>
        </div>
        <div class="correct-colors-box">
          <div class="correct-colors-label">✨ 正解のカラー</div>
          <div class="correct-colors-row" id="correctColorsRow"></div>
        </div>
      </section>

    </div>

    <!-- アクション -->
    <section class="action-section">
      <button class="btn btn-judge" id="btnJudge">判定する</button>
      <button class="btn btn-next hidden" id="btnNext">次のメンバーへ →</button>
    </section>

  </main>

  <div class="confetti-container" id="confettiContainer" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
